services:
  - type: web
    name: idbi-prospect-assist
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RM_DEMO_PIN
        value: "idbi2026"
    buildCommand: ""
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
